<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Image Target Demo</title>
  <style>
    *{margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden}
    #camerafeed{position:fixed;top:0;left:0;width:100%;height:100%;background:#000}
    #info{position:fixed;top:10px;left:10px;right:10px;background:rgba(0,0,0,.7);color:#fff;border-radius:8px;padding:12px;font:14px/1.4 sans-serif;z-index:10}
  </style>
</head>
<body>
  <!-- 只用一个 canvas，XR8 和 Three.js 共享同一个 WebGL context -->
  <canvas id="camerafeed"></canvas>
  <div id="info">Loading...</div>

  <script src="https://unpkg.com/three@0.137.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.137.0/examples/js/loaders/DRACOLoader.js"></script>
  <script src="https://unpkg.com/three@0.137.0/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    var canvas = document.getElementById('camerafeed');
    function resize() {
      var dpr = window.devicePixelRatio || 1;
      canvas.width  = window.innerWidth  * dpr;
      canvas.height = window.innerHeight * dpr;
    }
    resize();
    window.addEventListener('resize', resize);
  </script>
  <script>
    (function() {
      var realC8 = null;
      Object.defineProperty(window, '_c8', {
        get: function() { return realC8; },
        set: function(obj) {
          realC8 = obj;
          if (obj && typeof obj === 'object') {
            Object.defineProperty(obj, 'checkAllZeroes', {
              get: function() { return 0; },
              set: function() {},
              configurable: true, enumerable: true
            });
          }
        },
        configurable: true, enumerable: true
      });

      var t = 0;
      setInterval(function() {
        t += 0.05;
        try {
          window.dispatchEvent(new DeviceOrientationEvent('deviceorientation', {
            alpha: 0.1 + Math.sin(t) * 0.5,
            beta: 90 + Math.sin(t * 1.3) * 2,
            gamma: Math.cos(t * 0.7) * 1
          }));
        } catch(e) {}
      }, 16);
    })();
  </script>

  <script src="./xr-standalone/xr.js" data-preload-chunks="slam"></script>

  <script>
    var info = document.getElementById('info');

    // Three.js 对象在 onStart 时用 XR8 的 GL context 初始化
    var renderer3d, scene3d, camera3d, modelGroup;

    var targets = [{
      name: '01',
      imagePath: './image-targets/01/01_luminance.jpg',
      type: 'PLANAR',
      metadata: null,
      properties: {
        left: 0, top: 18, width: 536, height: 715,
        isRotated: true, originalWidth: 536, originalHeight: 750
      }
    }];

    function placeModel(detail) {
      if (!modelGroup) { console.warn('model not ready'); return; }

      modelGroup.position.set(detail.position.x, detail.position.y, detail.position.z);
      modelGroup.quaternion.set(detail.rotation.x, detail.rotation.y, detail.rotation.z, detail.rotation.w);

      var s = detail.scale;
      // scale 异常保护（XR8 有时返回极大或极小值）
      if (!isFinite(s) || s <= 0 || s > 100) s = 1.0;
      modelGroup.scale.set(s, s, s);

      modelGroup.visible = true;

      // 关键调试：打印模型与相机的距离和相对方向
      if (camera3d) {
        var dist = modelGroup.position.distanceTo(camera3d.position);
        // 计算模型是否在相机前方（dot > 0 = 前方，< 0 = 后方）
        var toModel = new THREE.Vector3().subVectors(modelGroup.position, camera3d.position).normalize();
        var camForward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera3d.quaternion);
        var dot = toModel.dot(camForward);
        console.log('[DEBUG] dist:', dist.toFixed(3),
          '| in front:', dot.toFixed(2), '(>0=visible)',
          '| model:', detail.position.x.toFixed(3), detail.position.y.toFixed(3), detail.position.z.toFixed(3),
          '| cam:', camera3d.position.x.toFixed(3), camera3d.position.y.toFixed(3), camera3d.position.z.toFixed(3),
          '| scale:', s.toFixed(3));
      }
    }

    function startAR() {
      XR8.addCameraPipelineModules([
        XR8.GlTextureRenderer.pipelineModule(),
        XR8.XrController.pipelineModule(),
        {
          name: 'app',

          // XR8 启动后在这里拿 GL context，创建 Three.js renderer
          onStart: function(e) {
            var gl = e.GLctx;

            renderer3d = new THREE.WebGLRenderer({
              canvas: canvas,
              context: gl,
              antialias: true,
              alpha: true
            });
            renderer3d.autoClear = false;       // 不清屏，保留 XR8 的摄像头画面
            renderer3d.setSize(canvas.width, canvas.height, false);
            renderer3d.setPixelRatio(1);

            scene3d = new THREE.Scene();
            camera3d = new THREE.PerspectiveCamera(60, canvas.width / canvas.height, 0.01, 1000);
            // 相机放在 XR8 世界坐标的初始位置 (0,2,0)，朝 -Z 看
            camera3d.position.set(0, 2, 0);
            camera3d.updateMatrixWorld(true);
            scene3d.add(camera3d);
            scene3d.add(new THREE.AmbientLight(0xffffff, 1.0));
            var dir = new THREE.DirectionalLight(0xffffff, 1.0);
            dir.position.set(0, 5, 5);
            scene3d.add(dir);

            // ★ 调试用：在相机正前方 1.3m 处放一个红球，验证渲染管线是否工作
            var debugBall = new THREE.Mesh(
              new THREE.SphereGeometry(0.15, 16, 16),
              new THREE.MeshBasicMaterial({ color: 0xff0000 })
            );
            debugBall.position.set(0, 2, -1.3); // 相机(0,2,0)前方 1.3m
            scene3d.add(debugBall);
            console.log('[DEBUG] red ball added at (0,2,-1.3)');

            // 加载模型
            var dracoLoader = new THREE.DRACOLoader();
            dracoLoader.setDecoderPath('https://unpkg.com/three@0.137.0/examples/js/libs/draco/');
            var loader = new THREE.GLTFLoader();
            loader.setDRACOLoader(dracoLoader);
            loader.load('./models/01.glb', function(gltf) {
              // 归一化：缩到最大边=1，居中
              var box = new THREE.Box3().setFromObject(gltf.scene);
              var size = new THREE.Vector3(), center = new THREE.Vector3();
              box.getSize(size); box.getCenter(center);
              var s = 1.0 / Math.max(size.x, size.y, size.z);
              gltf.scene.scale.multiplyScalar(s);
              gltf.scene.position.set(-center.x*s, -center.y*s, -center.z*s);

              modelGroup = new THREE.Group();
              modelGroup.add(gltf.scene);
              modelGroup.visible = false;
              scene3d.add(modelGroup);
              info.textContent = 'Ready. Point at target 01.';
              console.log('[DEBUG] model loaded');
            }, null, function(err) {
              console.error('[DEBUG] model load failed', err);
              info.textContent = 'Model load failed!';
            });

            info.textContent = 'Camera ready. Loading model...';
          },

          onUpdate: function(e) {
            if (!renderer3d) return;

            var pcr = e.processCpuResult;
            if (pcr && pcr.reality) {
              var r = pcr.reality;
              if (r.intrinsics) {
                for (var i = 0; i < 16; i++)
                  camera3d.projectionMatrix.elements[i] = r.intrinsics[i];
                camera3d.projectionMatrixInverse.copy(camera3d.projectionMatrix).invert();
              }
              if (r.rotation) camera3d.quaternion.set(r.rotation.x, r.rotation.y, r.rotation.z, r.rotation.w);
              if (r.position) camera3d.position.set(r.position.x, r.position.y, r.position.z);
              camera3d.updateMatrixWorld(true);
            }

            // XR8 会修改 GL state；共享 context 时，Three.js 渲染前必须重置。
            if (renderer3d.resetState) renderer3d.resetState();
            else renderer3d.state.reset();

            // XR8 的 viewport 可能带负 offset（cover/crop 用），直接拿来给 Three.js
            // 会把 3D 内容渲染到屏幕外。这里始终渲染整块 canvas。
            var vp = e.processGpuResult &&
              e.processGpuResult.gltexturerenderer &&
              e.processGpuResult.gltexturerenderer.viewport;
            if (vp && !window._viewportLogged) {
              window._viewportLogged = true;
              console.log('[DEBUG] xr viewport', JSON.stringify(vp));
              console.log('[DEBUG] canvas size', canvas.width + 'x' + canvas.height);
            }
            renderer3d.setViewport(0, 0, canvas.width, canvas.height);
            renderer3d.setScissorTest(false);
            camera3d.aspect = canvas.width / canvas.height;
            camera3d.updateProjectionMatrix();

            // clearDepth 确保 3D 模型不被视频流的深度缓冲遮挡
            renderer3d.clearDepth();
            renderer3d.render(scene3d, camera3d);
          },

          listeners: [
            { event: 'reality.imagescanning', process: function(e) {
              info.textContent = 'Scanning...';
            }},
            { event: 'reality.imagefound', process: function(e) {
              info.textContent = 'FOUND: ' + e.detail.name;
              info.style.background = 'rgba(0,150,0,.8)';
              placeModel(e.detail);
            }},
            { event: 'reality.imageupdated', process: function(e) {
              info.textContent = 'Tracking: ' + e.detail.name;
              placeModel(e.detail);
            }},
            { event: 'reality.imagelost', process: function(e) {
              info.textContent = 'Lost. Scanning...';
              info.style.background = 'rgba(0,0,0,.7)';
              if (modelGroup) modelGroup.visible = false;
            }}
          ]
        }
      ]);

      XR8.XrController.configure({
        disableWorldTracking: true,
        imageTargetData: targets
      });

      XR8.run({
        canvas: canvas,
        allowedDevices: XR8.XrConfig.device().ANY,
        cameraConfig: { direction: XR8.XrConfig.camera().BACK }
      });
    }

    if (window.XR8) { startAR(); }
    else { window.addEventListener('xrloaded', startAR); }
  </script>
</body>
</html>
